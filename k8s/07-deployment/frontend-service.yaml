# Part 7 — Service (frontend)
#
# LoadBalancer type — with minikube tunnel running, the frontend will be
# accessible at http://localhost:4173 in your browser.
#
# Fill in the selector ???, then apply:
#   kubectl apply -f k8s/07-deployment/frontend-service.yaml

apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    app: ???    # Must match the label on the frontend Deployment pod template.
  type: LoadBalancer
  ports:
    - port: 4173
      targetPort: 4173
